<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Braintree Sandbox Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-green-300 font-mono min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-2xl mb-4 text-green-400">Payment Monitor Console</h1>

    <div class="bg-zinc-900 border border-green-700 rounded p-4 mb-4">
      <label class="block mb-2 text-sm text-green-400">Entrada masiva (numero|mes|año|cvv por línea)</label>
      <textarea id="bulkInput" class="w-full h-48 bg-black border border-green-700 rounded p-3 text-green-200" placeholder="4111111111111111|12|2030|123"></textarea>
      <button id="runBtn" class="mt-3 px-4 py-2 bg-green-700 hover:bg-green-600 rounded text-black font-bold">Procesar</button>
    </div>

    <div class="bg-zinc-900 border border-green-700 rounded p-4 overflow-auto">
      <table class="w-full text-sm">
        <thead class="text-green-400 border-b border-green-800">
          <tr>
            <th class="text-left p-2">Identificador</th>
            <th class="text-left p-2">Emisor</th>
            <th class="text-left p-2">Resultado Bancario</th>
            <th class="text-left p-2">Código de Respuesta</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const resultsBody = document.getElementById('resultsBody');

    function addRow(data) {
      const tr = document.createElement('tr');
      tr.className = 'border-b border-zinc-800';
      tr.innerHTML = `
        <td class="p-2">${data.identifier ?? '-'}</td>
        <td class="p-2">${data.issuer ?? 'UNKNOWN'}</td>
        <td class="p-2 ${data.status === 'APPROVED' ? 'text-emerald-400' : 'text-red-400'}">${data.bank_result ?? data.status}</td>
        <td class="p-2">${data.response_code ?? '-'}</td>
      `;
      resultsBody.appendChild(tr);
    }

    async function processLine(line, index) {
      const parts = line.split('|').map(x => x.trim());
      const payload = {
        identifier: `ROW-${index + 1}`,
        number: parts[0] || '',
        month: parts[1] || '',
        year: parts[2] || '',
        cvv: parts[3] || ''
      };

      const response = await fetch('/validate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      addRow(data);
    }

    document.getElementById('runBtn').addEventListener('click', async () => {
      resultsBody.innerHTML = '';
      const lines = document.getElementById('bulkInput').value
        .split('\n')
        .map(l => l.trim())
        .filter(Boolean);

      for (let i = 0; i < lines.length; i++) {
        try {
          await processLine(lines[i], i);
        } catch (error) {
          addRow({
            identifier: `ROW-${i + 1}`,
            issuer: 'UNKNOWN',
            bank_result: `Error: ${error.message}`,
            response_code: '-'
          });
        }
      }
    });
  </script>
</body>
</html>
